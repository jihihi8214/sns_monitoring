name: SNS Monitor

on:
  schedule:
    # 매시 정각 (GitHub 서버 부하에 따라 몇 분 지연될 수 있음)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      skip_relevance_filter:
        description: "테스트용: AI/ICT 필터 끄고 새 글이면 무조건 메일 보내기"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: 환경설정 파일 생성
        run: |
          cat > .env << EOF
          EMAIL_TO=${{ secrets.EMAIL_TO }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          EOF
          mkdir -p data
          if [ -n "${{ secrets.TWITTER_STATE_B64 }}" ]; then
            echo "${{ secrets.TWITTER_STATE_B64 }}" | base64 -d > data/twitter_state.json
          fi
          if [ -n "${{ secrets.FACEBOOK_STATE_B64 }}" ]; then
            echo "${{ secrets.FACEBOOK_STATE_B64 }}" | base64 -d > data/facebook_state.json
          fi

      - name: 모니터링 실행
        env:
          HEADLESS: "false"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SKIP_RELEVANCE_FILTER: ${{ inputs.skip_relevance_filter }}
        run: xvfb-run -a python3 monitor.py

      - name: 변경사항 커밋 (seen.json / CSV / reports)
        run: |
          git config user.name "sns-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/seen.json data/new_items.csv data/sns_monitoring.xlsx data/sns_monitoring.html reports/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "auto: SNS 모니터링 업데이트 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "변경사항 없음"
          fi
